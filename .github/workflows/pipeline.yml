name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint
      - run: npm test
      - run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e

  deploy:
    needs: [build_and_test]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Verify deployment health
        run: curl --fail https://msami936-part11-exercise21.fly.dev/health

  tag_release:
    needs: [deploy]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch

  notify_success:
    needs: [deploy, tag_release]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') && needs.deploy.result == 'success' && needs.tag_release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify on deployment success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          nodetail: true
          content: '✅ **Deployment Successful!** A new version deployed to production'
          title: Deployment Details
          description: |
            Commit: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.event.head_commit.author.name }}

  notify_failure:
    needs: [build_and_test, deploy, tag_release]
    if: ${{ always() && (needs.build_and_test.result == 'failure' || needs.deploy.result == 'failure' || needs.tag_release.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify on failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          content: '❌ **Build Failed!** The pipeline encountered an error'
          title: Failure Details
          description: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.event.head_commit.author.name }}
            Workflow: ${{ github.workflow }}
            Job: ${{ needs.build_and_test.result == 'failure' && 'build_and_test' || (needs.deploy.result == 'failure' && 'deploy' || 'tag_release') }}
            [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
